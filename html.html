<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background-color: #f4f4f4;
    }

    /* Toggle Button */
    .menu-toggle {
      position: absolute;
      top: 20px;
      left: 20px;
      cursor: pointer;
      z-index: 1001;
    }

    .menu-toggle span {
      display: block;
      width: 25px;
      height: 3px;
      background: #333;
      margin: 5px 0;
      transition: 0.4s;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: -200px;
      width: 200px;
      height: 100%;
      background-color: #004182; /* LinkedIn blue */
      padding-top: 60px;
      transition: left 0.3s ease;
      z-index: 1000;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 15px 20px;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar ul li:hover,
    .sidebar ul li.active {
      background-color: #0366c2;
    }

    /* Page content placeholder */
    .content {
      margin-left: 60px;
      padding: 40px;
    }
  </style>
</head>
<body>

  <!-- Toggle Button -->
  <div class="menu-toggle" id="menuToggle">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <ul>
      <li class="active">Dashboard</li>
      <li>Calendar</li>
      <li>Pending Approvals</li>
      <li>History</li>
    </ul>
  </div>

  <!-- Content Area -->
  <div class="content">
    <h1>Welcome</h1>
    <p>Select an item from the sidebar.</p>
  </div>

  <!-- JavaScript -->
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const links = sidebar.querySelectorAll('li');

    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    links.forEach(link => {
      link.addEventListener('click', () => {
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        sidebar.classList.remove('open');
      });
    });
  </script>

</body>
</html>
